<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>이스트캠프 - 신청 안내</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <section class="qna-section">
      <h2 class="hidden">질문 및 답변 영역</h2>
      <!-- 왼쪽 리스트 뭉치 -->
      <div class="qna-list">
        <!-- 아이템 1 -->
        <div class="qna-item">
          <div class="icon-box">
            <img src="image/icon.svg" alt="아이콘" />
          </div>
          <div class="qna-text">
            <strong
              >비전공자이지만 기획·개발·보안 직군으로 취업과 이직을 희망하는
              분</strong
            >
            <p>
              기초부터 실무까지 체계적으로 학습하여 커리어 전환을 도와드립니다.
            </p>
          </div>
        </div>

        <!-- 아이템 2 -->
        <div class="qna-item">
          <div class="icon-box">
            <img src="image/icon.svg" alt="아이콘" />
          </div>
          <div class="qna-text">
            <strong
              >전문가의 실무 노하우와 현업에 대한 인사이트를 얻고 싶은
              분</strong
            >
            <p>현업 전문가의 멘토링을 통해 실전 감각을 익힐 수 있습니다.</p>
          </div>
        </div>

        <!-- 아이템 3 & 4 (필요하면 위 형식을 복사해서 더 추가해!) -->
      </div>

      <!-- 오른쪽 큰 제목 뭉치 -->
      <div class="qna-header">
        <h2><span class="highlight">누구나</span><br />신청 가능한가요?</h2>
        <p>지원 자격을 갖추신 분이라면<br />누구나 신청할 수 있습니다.</p>
      </div>
    </section>
  </body>
</html>
